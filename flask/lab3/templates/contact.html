<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Flask Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="font-bold text-2xl text-blue-600">FlaskFolio</a>
                </div>
                <div class="flex space-x-8 items-center">
                    <a href="/" class="text-gray-500 hover:text-blue-600 hover:border-b-2 hover:border-blue-300 px-1 py-2 text-sm font-medium transition-colors">Home</a>
                    <a href="/about" class="text-gray-500 hover:text-blue-600 hover:border-b-2 hover:border-blue-300 px-1 py-2 text-sm font-medium transition-colors">About</a>
                    <a href="/portfolio" class="text-gray-500 hover:text-blue-600 hover:border-b-2 hover:border-blue-300 px-1 py-2 text-sm font-medium transition-colors">Portfolio</a>
                    <!-- Active link -->
                    <a href="/contact" class="text-gray-900 border-b-2 border-blue-500 px-1 py-2 text-sm font-medium">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-6 flex items-center justify-center">
        <div class="w-full max-w-lg bg-white rounded-2xl shadow-sm p-8 border border-gray-100">
            <h2 class="text-3xl font-bold text-gray-900 mb-2 text-center">Get in Touch</h2>
            <p class="text-gray-500 text-center mb-8">Send me a message to discuss projects or just say hi!</p>
            
            <!-- 
                When practicing Flask forms, you can add method="POST" here 
                and handle the request.form data in your app.py 
            -->
            <form action="/submit" method="POST" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" id="name" name="name" required class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="John Doe">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" name="email" required class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="john@example.com">
                </div>
                
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea id="message" name="message" rows="4" required class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors resize-none" placeholder="Your message here..."></textarea>
                </div>
                
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-gray-500">
        <p>&copy; 2026 Flask Practice Site. Built with Python & Tailwind CSS.</p>
    </footer>

</body>
</html>
